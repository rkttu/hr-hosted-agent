name: Track Upstream Changes

on:
  schedule:
    # Run every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/leyredelacalzada/hr-hosted-agent.git
          git fetch upstream master

      - name: Check for new upstream commits
        id: diff
        run: |
          # Find the merge base between our master and upstream master
          MERGE_BASE=$(git merge-base HEAD upstream/master 2>/dev/null || echo "")

          if [ -z "$MERGE_BASE" ]; then
            echo "No common ancestor found — treating as new changes exist"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "commit_count=unknown" >> "$GITHUB_OUTPUT"
            echo "summary=No common ancestor found with upstream. Manual review required." >> "$GITHUB_OUTPUT"
          else
            # Count commits on upstream that are not in our branch
            COMMIT_COUNT=$(git rev-list --count "$MERGE_BASE"..upstream/master)

            if [ "$COMMIT_COUNT" -gt 0 ]; then
              echo "has_changes=true" >> "$GITHUB_OUTPUT"
              echo "commit_count=$COMMIT_COUNT" >> "$GITHUB_OUTPUT"

              # Build a short log summary (max 20 commits)
              SUMMARY=$(git log --oneline --no-merges "$MERGE_BASE"..upstream/master | head -20)
              # Escape for GitHub Actions multiline output
              EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
              echo "summary<<$EOF" >> "$GITHUB_OUTPUT"
              echo "$SUMMARY" >> "$GITHUB_OUTPUT"
              echo "$EOF" >> "$GITHUB_OUTPUT"
            else
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Create issue if upstream has changes
        if: steps.diff.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const commitCount = '${{ steps.diff.outputs.commit_count }}';
            const summary = `${{ steps.diff.outputs.summary }}`;
            const today = new Date().toISOString().slice(0, 10);

            // Check if an open issue with the same label already exists
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'upstream-sync',
              state: 'open',
            });

            if (existing.data.length > 0) {
              console.log('An open upstream-sync issue already exists — skipping.');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Upstream Sync] ${commitCount} new commit(s) detected (${today})`,
              labels: ['upstream-sync'],
              body: [
                '## Upstream Changes Detected',
                '',
                `The upstream repository [leyredelacalzada/hr-hosted-agent](https://github.com/leyredelacalzada/hr-hosted-agent) has **${commitCount}** new commit(s) since the last sync point.`,
                '',
                '### Recent Commits',
                '',
                '```',
                summary,
                '```',
                '',
                '### Action Required',
                '',
                '1. Review the changes: `git fetch upstream master && git log ..upstream/master`',
                '2. Merge or cherry-pick: `git merge upstream/master` or selectively pick commits',
                '3. Resolve any conflicts and verify the build',
                '4. Close this issue once sync is complete',
              ].join('\n'),
            });
